<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lumina Studio - Context Aware Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --accent: #3b82f6;
            --accent-rot: #10b981;
            --accent-scl: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; overflow: hidden; background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        .compact-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .left-sidebar {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 280px;
            max-height: calc(100vh - 24px);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: all 0.2s ease;
        }

        .scroll-container { overflow-y: auto; flex-grow: 1; padding: 12px; }
        .scroll-container::-webkit-scrollbar { width: 3px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        label { display: block; font-size: 0.6rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        
        input[type="number"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 0.7rem;
            outline: none;
        }

        /* Mode-aware transform buttons */
        .transform-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 6px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }
        .transform-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .transform-btn:hover { background: rgba(255, 255, 255, 0.08); }
        
        /* Active states with mode-specific colors */
        .transform-btn.active[data-mode="translate"] { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent); 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }
        .transform-btn.active[data-mode="rotate"] { 
            background: var(--accent-rot); 
            color: white; 
            border-color: var(--accent-rot); 
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .transform-btn.active[data-mode="scale"] { 
            background: var(--accent-scl); 
            color: white; 
            border-color: var(--accent-scl); 
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .space-toggle-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 2px 6px;
            font-size: 9px;
            border-radius: 4px;
            cursor: pointer;
        }
        .space-toggle-btn.local { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); }

        /* Context-sensitive property groups */
        .param-group {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 6px 8px;
            margin-bottom: 6px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            max-height: 200px;
            opacity: 1;
            overflow: hidden;
        }
        
        /* Hidden state for non-active modes */
        .param-group.hidden-mode {
            max-height: 0;
            opacity: 0;
            margin: 0;
            padding: 0 8px;
            pointer-events: none;
        }
        
        /* Mode-specific accent borders */
        .param-group[data-mode="translate"] { border-color: rgba(59, 130, 246, 0.2); }
        .param-group[data-mode="rotate"] { border-color: rgba(16, 185, 129, 0.2); }
        .param-group[data-mode="scale"] { border-color: rgba(245, 158, 11, 0.2); }
        
        /* Active mode highlighting */
        .param-group.active-mode[data-mode="translate"] { 
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        .param-group.active-mode[data-mode="rotate"] { 
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }
        .param-group.active-mode[data-mode="scale"] { 
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.1);
        }

        .coord-row {
            display: grid;
            grid-template-columns: 18px 1fr 1fr 1fr;
            gap: 6px;
            align-items: center;
            font-size: 9px;
            margin-top: 3px;
        }
        .coord-label {
            font-weight: 700;
            font-size: 9px;
        }
        /* Mode-colored labels */
        .param-group[data-mode="translate"] .coord-label { color: #60a5fa; }
        .param-group[data-mode="rotate"] .coord-label { color: #34d399; }
        .param-group[data-mode="scale"] .coord-label { color: #fbbf24; }
        
        .mini-input {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 4px;
            color: white;
            font-size: 10px;
            text-align: center;
            transition: all 0.15s;
        }
        .mini-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .section-title {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Enhanced Outliner */
        .outliner-item {
            padding: 5px 6px;
            border-radius: 6px;
            margin-bottom: 2px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }
        .outliner-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
        }
        .outliner-item.selected { 
            background: rgba(59, 130, 246, 0.2); 
            border-color: var(--accent); 
            color: #60a5fa; 
        }
        .outliner-item.selected .outliner-actions {
            opacity: 1;
            pointer-events: auto;
        }
        
        .outliner-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        .outliner-icon {
            font-size: 10px;
            opacity: 0.8;
        }
        .outliner-name {
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .outliner-id {
            opacity: 0.4;
            font-size: 8px;
            font-family: monospace;
        }
        
        .outliner-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .outliner-item:hover .outliner-actions {
            opacity: 1;
            pointer-events: auto;
        }
        .outliner-action-btn {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.1s;
        }
        .outliner-action-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .outliner-action-btn.duplicate:hover {
            background: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }
        .outliner-action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .footer-hints {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 9px;
            color: #94a3b8;
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            pointer-events: none;
            display: flex;
            gap: 12px;
            z-index: 10;
            white-space: nowrap;
        }

        .kbd { background: #1e293b; padding: 2px 5px; border-radius: 4px; color: #cbd5e1; font-size: 8px; font-weight: bold; margin: 0 2px; }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content { width: 100%; max-width: 480px; max-height: 80vh; }
        textarea {
            width: 100%;
            height: 200px;
            background: #0a0f1a;
            color: #10b981;
            font-family: monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            resize: none;
        }

        .tool-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            transition: all 0.15s;
            cursor: pointer;
        }
        .tool-icon:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
        .tool-icon:disabled { opacity: 0.25; cursor: not-allowed; }
        
        .glow-slider {
            height: 3px;
            background: #334155;
            border-radius: 3px;
        }
        button:active { transform: scale(0.97); }
        
        /* Mode indicator badge */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .mode-badge.translate { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .mode-badge.rotate { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .mode-badge.scale { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        
        .outliner-empty {
            text-align: center;
            padding: 12px;
            opacity: 0.3;
            font-size: 9px;
            font-style: italic;
        }
        
        /* Material section always visible but subtle */
        .material-section {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 6px 8px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="left-sidebar compact-panel">
        <!-- Compact Header -->
        <div class="px-3 py-2 border-b border-white/10 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-4 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_#3b82f6]"></div>
                <span class="text-[11px] font-black tracking-wider">LUMINA</span>
            </div>
            <div class="flex gap-1">
                <button onclick="openExport()" class="text-[8px] bg-white/10 hover:bg-white/20 px-2 py-0.5 rounded">EXP</button>
                <button onclick="openImport()" class="text-[8px] bg-white/10 hover:bg-white/20 px-2 py-0.5 rounded">IMP</button>
            </div>
        </div>
        
        <!-- History Toolbar -->
        <div class="flex gap-1 items-center px-3 py-1.5 border-b border-white/5 bg-black/20">
            <button id="undo-btn" onclick="undo()" class="tool-icon" title="Undo (Ctrl+Z)">
                <svg class="w-3.5 h-3.5 fill-white/80" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button id="redo-btn" onclick="redo()" class="tool-icon" title="Redo (Ctrl+Y)">
                <svg class="w-3.5 h-3.5 fill-white/80" viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.92 16c1.05-3.19 4.05-5.5 7.58-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
            </button>
            <div class="h-3 w-px bg-white/15 mx-1"></div>
            <span class="text-[8px] text-slate-400 font-mono">HISTORY</span>
        </div>

        <div class="scroll-container">
            <!-- Create Row -->
            <div class="mb-3">
                <label class="text-[8px]">➕ CREATE</label>
                <div class="grid grid-cols-4 gap-1.5">
                    <button onclick="addShape('box')" class="bg-white/5 hover:bg-white/10 py-1.5 rounded text-sm transition" title="Box">📦</button>
                    <button onclick="addShape('sphere')" class="bg-white/5 hover:bg-white/10 py-1.5 rounded text-sm transition" title="Sphere">⚪</button>
                    <button onclick="addShape('cylinder')" class="bg-white/5 hover:bg-white/10 py-1.5 rounded text-sm transition" title="Cylinder">🧴</button>
                    <button onclick="addShape('torus')" class="bg-white/5 hover:bg-white/10 py-1.5 rounded text-sm transition" title="Torus">🍩</button>
                </div>
            </div>

            <!-- Enhanced Outliner -->
            <div class="mb-3">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-[8px] mb-0">📁 SCENE</label>
                    <span id="object-count" class="text-[7px] text-slate-500 font-mono">0 objects</span>
                </div>
                <div id="scene-outliner" class="space-y-0.5 max-h-[160px] overflow-y-auto pr-1">
                    <div class="outliner-empty">No objects in scene</div>
                </div>
            </div>

            <!-- Context-Sensitive Inspector -->
            <div id="inspector" class="hidden space-y-2">
                <!-- Mode Toggle + Space -->
                <div class="flex justify-between items-center gap-2 mb-2">
                    <div class="flex gap-1 flex-1">
                        <button id="btn-translate" data-mode="translate" onclick="setGizmoMode('translate')" class="transform-btn flex-1 text-[9px] py-1 font-bold">MOVE</button>
                        <button id="btn-rotate" data-mode="rotate" onclick="setGizmoMode('rotate')" class="transform-btn flex-1 text-[9px] py-1 font-bold">ROT</button>
                        <button id="btn-scale" data-mode="scale" onclick="setGizmoMode('scale')" class="transform-btn flex-1 text-[9px] py-1 font-bold">SCALE</button>
                    </div>
                    <button id="space-toggle" onclick="toggleSpace()" class="space-toggle-btn text-[8px] px-2 py-1">LOCAL</button>
                </div>

                <!-- Position - Only visible in Translate mode -->
                <div id="pos-group" class="param-group active-mode" data-mode="translate">
                    <div class="section-title">
                        <span class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                            📍 POSITION
                        </span>
                        <span class="text-blue-400 text-[7px]">XYZ</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">X</span><input type="number" id="posX" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Y</span><input type="number" id="posY" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Z</span><input type="number" id="posZ" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                    </div>
                </div>

                <!-- Rotation - Only visible in Rotate mode -->
                <div id="rot-group" class="param-group hidden-mode" data-mode="rotate">
                    <div class="section-title">
                        <span class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                            🔄 ROTATION
                        </span>
                        <span class="text-emerald-400 text-[7px]">DEG</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">X</span><input type="number" id="rotX" step="1" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Y</span><input type="number" id="rotY" step="1" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Z</span><input type="number" id="rotZ" step="1" class="mini-input" onchange="saveHistoryAndUpdate()">
                    </div>
                </div>

                <!-- Scale - Only visible in Scale mode -->
                <div id="scl-group" class="param-group hidden-mode" data-mode="scale">
                    <div class="section-title">
                        <span class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                            📐 SCALE
                        </span>
                        <button onclick="resetScale()" class="text-[7px] bg-white/10 hover:bg-white/20 px-1.5 rounded transition">↺</button>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">X</span><input type="number" id="sclX" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Y</span><input type="number" id="sclY" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                        <span class="coord-label">Z</span><input type="number" id="sclZ" step="0.05" class="mini-input" onchange="saveHistoryAndUpdate()">
                    </div>
                </div>

                <!-- Material - Always visible but subtle -->
                <div class="material-section">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[8px] font-bold text-slate-300">🎨 MATERIAL</span>
                        <input type="color" id="shapeCol" onchange="saveHistory()" oninput="updateFromUI()" class="w-5 h-5 rounded-full bg-transparent cursor-pointer border border-white/20">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-amber-400 text-[8px] font-bold">✨</span>
                        <input type="range" id="emissionIntensity" min="0" max="20" step="0.2" value="0" onchange="saveHistory()" oninput="updateFromUI()" class="flex-1 h-1 rounded-full accent-amber-400">
                        <span id="glowVal" class="text-[9px] bg-amber-500/20 px-1.5 rounded text-amber-300">0.0</span>
                        <input type="color" id="emissionColor" onchange="saveHistory()" oninput="updateFromUI()" class="w-5 h-5 bg-transparent border-none cursor-pointer">
                    </div>
                </div>
            </div>

            <div id="no-selection" class="py-8 text-center opacity-40 border border-dashed border-white/10 rounded-lg mt-2">
                <p class="text-[9px]">◉ click object to edit</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="export-modal" class="modal" onclick="closeModals(event)">
        <div class="modal-content compact-panel p-4" onclick="event.stopPropagation()">
            <label class="text-[9px]">EXPORT SCENE JSON</label>
            <textarea id="export-area" readonly class="text-[9px]"></textarea>
            <div class="flex gap-2 mt-3">
                <button onclick="copyExport()" class="flex-1 py-2 bg-blue-600 rounded text-[9px] font-bold">COPY</button>
                <button onclick="closeModals()" class="px-4 py-2 bg-white/5 rounded text-[9px]">CLOSE</button>
            </div>
        </div>
    </div>
    <div id="import-modal" class="modal" onclick="closeModals(event)">
        <div class="modal-content compact-panel p-4" onclick="event.stopPropagation()">
            <label class="text-[9px]">IMPORT JSON</label>
            <textarea id="import-area" placeholder='[{ "type": "box", "position": {...} }]' class="text-[9px]"></textarea>
            <div class="flex gap-2 mt-3">
                <button onclick="importScene()" class="flex-1 py-2 bg-green-600 rounded text-[9px] font-bold">LOAD</button>
                <button onclick="closeModals()" class="px-4 py-2 bg-white/5 rounded text-[9px]">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="footer-hints">
        <span><span class="kbd">⌘Z</span> Undo</span>
        <span><span class="kbd">⌘Y</span> Redo</span>
        <span><span class="kbd">W/E/R</span> Mode</span>
        <span><span class="kbd">X</span> Space</span>
        <span><span class="kbd">Del</span> Remove</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    
    <script>
        let scene, camera, renderer, controls, transformControl;
        let shapes = [], selectedObject = null;
        const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        let history = [], historyIndex = -1;
        const MAX_HISTORY = 50, GLOW_THRESHOLD = 5.0;
        let currentMode = 'translate'; // Track current mode

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.FogExp2(0x020617, 0.01);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x404060, 0.4);
            scene.add(ambient);
            const hemi = new THREE.HemisphereLight(0x88aaff, 0x1a1f2e, 0.5);
            scene.add(hemi);
            const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(1024, 1024);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x4466aa, 0.3);
            fillLight.position.set(-2, 3, -4);
            scene.add(fillLight);

            const grid = new THREE.GridHelper(60, 40, 0x334155, 0x1e293b);
            grid.position.y = 0.01;
            grid.raycast = () => null;
            scene.add(grid);
            
            transformControl = new THREE.TransformControls(camera, renderer.domElement);
            transformControl.addEventListener('dragging-changed', (e) => controls.enabled = !e.value);
            transformControl.addEventListener('mouseUp', () => saveHistory());
            transformControl.addEventListener('objectChange', () => { if(selectedObject) updateUIFromObject(); });
            scene.add(transformControl);

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('keydown', onKeyDown);

            // Initialize UI mode
            updateModeUI('translate');
            
            // Starter objects
            addShape('box', { position: {x: -2, y: 0.5, z: -0.8}, color: '#3b82f6', emissiveIntensity: 0 }, false);
            addShape('sphere', { position: {x: 2.2, y: 0.7, z: 0.3}, color: '#f59e0b', emissiveIntensity: 6.5, emissiveColor: '#ffaa44' }, false);
            saveHistory();
        }

        function updateGlowAndShadowBehavior(mesh) {
            const intensity = mesh.material.emissiveIntensity;
            const isEmissive = intensity > GLOW_THRESHOLD;
            mesh.castShadow = !isEmissive;
            mesh.receiveShadow = !isEmissive;
            let light = mesh.userData.pointLight;
            if (!light) {
                light = new THREE.PointLight(mesh.material.emissive, 0, 10);
                mesh.add(light);
                mesh.userData.pointLight = light;
            }
            if (isEmissive) {
                light.color.set(mesh.material.emissive);
                light.intensity = Math.min(intensity * 1.4, 5.5);
                light.distance = 7 + intensity * 0.2;
                light.visible = true;
            } else {
                light.intensity = 0;
                light.visible = false;
            }
            mesh.material.roughness = isEmissive ? 0.2 : 0.35;
        }

        function saveHistory() {
            const snap = shapes.map(s => ({
                type: s.userData.type, id: s.userData.id,
                position: { x: s.position.x, y: s.position.y, z: s.position.z },
                rotation: { x: s.rotation.x, y: s.rotation.y, z: s.rotation.z },
                scale: { x: s.scale.x, y: s.scale.y, z: s.scale.z },
                color: '#' + s.material.color.getHexString(),
                emissiveIntensity: s.material.emissiveIntensity,
                emissiveColor: '#' + s.material.emissive.getHexString()
            }));
            if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
            history.push(JSON.stringify(snap));
            if (history.length > MAX_HISTORY) history.shift();
            historyIndex = history.length - 1;
            updateHistoryButtons();
        }
        function saveHistoryAndUpdate() { updateFromUI(); saveHistory(); }
        function undo() { if (historyIndex > 0) { historyIndex--; applyHistoryState(history[historyIndex]); } }
        function redo() { if (historyIndex < history.length - 1) { historyIndex++; applyHistoryState(history[historyIndex]); } }
        function applyHistoryState(json) {
            const data = JSON.parse(json);
            shapes.forEach(s => scene.remove(s));
            shapes = []; deselectObject();
            data.forEach(cfg => { addShape(cfg.type, cfg, false); });
            updateOutliner(); updateHistoryButtons();
        }
        function updateHistoryButtons() {
            document.getElementById('undo-btn').disabled = historyIndex <= 0;
            document.getElementById('redo-btn').disabled = historyIndex >= history.length - 1;
        }

        function addShape(type, config = {}, recordHistory = true) {
            let geo;
            if(type === 'box') geo = new THREE.BoxGeometry(1, 1, 1);
            else if(type === 'sphere') geo = new THREE.SphereGeometry(0.65, 48, 48);
            else if(type === 'cylinder') geo = new THREE.CylinderGeometry(0.55, 0.55, 1.2, 32);
            else geo = new THREE.TorusGeometry(0.6, 0.18, 48, 64);
            const intensity = config.emissiveIntensity || 0;
            const mat = new THREE.MeshStandardMaterial({
                color: config.color || '#3b82f6',
                roughness: 0.3,
                metalness: 0.1,
                emissive: config.emissiveColor || '#000000',
                emissiveIntensity: intensity
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = intensity <= GLOW_THRESHOLD;
            mesh.userData.type = type;
            mesh.userData.id = config.id || Math.random().toString(36).substr(2, 4);
            if(config.position) mesh.position.copy(config.position);
            if(config.rotation) mesh.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);
            if(config.scale) mesh.scale.set(config.scale.x, config.scale.y, config.scale.z);
            else mesh.scale.set(1,1,1);
            const pLight = new THREE.PointLight(mat.emissive, 0, 10);
            pLight.visible = intensity > GLOW_THRESHOLD;
            mesh.add(pLight);
            mesh.userData.pointLight = pLight;
            scene.add(mesh);
            shapes.push(mesh);
            updateGlowAndShadowBehavior(mesh);
            selectObject(mesh);
            if(recordHistory) saveHistory();
            updateOutliner();
            return mesh;
        }

        function selectObject(obj) {
            if(selectedObject === obj) return;
            selectedObject = obj;
            transformControl.attach(obj);
            document.getElementById('inspector').classList.remove('hidden');
            document.getElementById('no-selection').classList.add('hidden');
            updateUIFromObject();
            updateOutliner();
        }
        function deselectObject() {
            selectedObject = null;
            transformControl.detach();
            document.getElementById('inspector').classList.add('hidden');
            document.getElementById('no-selection').classList.remove('hidden');
            updateOutliner();
        }
        
        // Context-sensitive UI update
        function updateModeUI(mode) {
            currentMode = mode;
            
            // Update button states
            document.querySelectorAll('.transform-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.mode === mode) btn.classList.add('active');
            });
            
            // Show/hide parameter groups with animation
            const groups = ['pos-group', 'rot-group', 'scl-group'];
            const modeMap = { 'translate': 'pos-group', 'rotate': 'rot-group', 'scale': 'scl-group' };
            
            groups.forEach(groupId => {
                const group = document.getElementById(groupId);
                if(groupId === modeMap[mode]) {
                    group.classList.remove('hidden-mode');
                    group.classList.add('active-mode');
                } else {
                    group.classList.add('hidden-mode');
                    group.classList.remove('active-mode');
                }
            });
        }
        
        function updateUIFromObject() {
            if(!selectedObject) return;
            document.getElementById('posX').value = selectedObject.position.x.toFixed(2);
            document.getElementById('posY').value = selectedObject.position.y.toFixed(2);
            document.getElementById('posZ').value = selectedObject.position.z.toFixed(2);
            document.getElementById('rotX').value = (selectedObject.rotation.x * 180/Math.PI).toFixed(0);
            document.getElementById('rotY').value = (selectedObject.rotation.y * 180/Math.PI).toFixed(0);
            document.getElementById('rotZ').value = (selectedObject.rotation.z * 180/Math.PI).toFixed(0);
            document.getElementById('sclX').value = selectedObject.scale.x.toFixed(2);
            document.getElementById('sclY').value = selectedObject.scale.y.toFixed(2);
            document.getElementById('sclZ').value = selectedObject.scale.z.toFixed(2);
            document.getElementById('shapeCol').value = '#' + selectedObject.material.color.getHexString();
            const intens = selectedObject.material.emissiveIntensity;
            document.getElementById('emissionIntensity').value = intens;
            document.getElementById('glowVal').innerText = intens.toFixed(1);
            document.getElementById('emissionColor').value = '#' + selectedObject.material.emissive.getHexString();
        }
        function updateFromUI() {
            if(!selectedObject) return;
            selectedObject.position.set(parseFloat(document.getElementById('posX').value)||0, parseFloat(document.getElementById('posY').value)||0, parseFloat(document.getElementById('posZ').value)||0);
            selectedObject.rotation.set((parseFloat(document.getElementById('rotX').value)||0)*Math.PI/180, (parseFloat(document.getElementById('rotY').value)||0)*Math.PI/180, (parseFloat(document.getElementById('rotZ').value)||0)*Math.PI/180);
            selectedObject.scale.set(parseFloat(document.getElementById('sclX').value)||1, parseFloat(document.getElementById('sclY').value)||1, parseFloat(document.getElementById('sclZ').value)||1);
            selectedObject.material.color.set(document.getElementById('shapeCol').value);
            const intens = parseFloat(document.getElementById('emissionIntensity').value);
            selectedObject.material.emissive.set(document.getElementById('emissionColor').value);
            selectedObject.material.emissiveIntensity = intens;
            document.getElementById('glowVal').innerText = intens.toFixed(1);
            updateGlowAndShadowBehavior(selectedObject);
        }
        function resetScale() { if(selectedObject) { document.getElementById('sclX').value=1; document.getElementById('sclY').value=1; document.getElementById('sclZ').value=1; updateFromUI(); saveHistory(); } }
        
        function setGizmoMode(mode) { 
            transformControl.setMode(mode); 
            updateModeUI(mode);
        }
        
        function toggleSpace() { 
            const next = transformControl.space === 'local' ? 'world' : 'local'; 
            transformControl.setSpace(next); 
            const btn = document.getElementById('space-toggle'); 
            btn.textContent = next.toUpperCase(); 
            btn.classList.toggle('local', next === 'local'); 
        }
        
        function duplicateObject(obj) {
            if(!obj) return;
            const newObj = addShape(obj.userData.type, { 
                position: {x: obj.position.x + 0.8, y: obj.position.y, z: obj.position.z + 0.8}, 
                rotation: {x: obj.rotation.x, y: obj.rotation.y, z: obj.rotation.z}, 
                scale: {x: obj.scale.x, y: obj.scale.y, z: obj.scale.z}, 
                color: '#' + obj.material.color.getHexString(), 
                emissiveIntensity: obj.material.emissiveIntensity, 
                emissiveColor: '#' + obj.material.emissive.getHexString() 
            });
            return newObj;
        }
        
        function deleteObject(obj) {
            if(!obj) return;
            scene.remove(obj);
            shapes = shapes.filter(s => s !== obj);
            if(selectedObject === obj) deselectObject();
            updateOutliner();
            saveHistory();
        }
        
        function duplicateSelected() { duplicateObject(selectedObject); }
        function deleteSelected() { deleteObject(selectedObject); }
        
        function updateOutliner() { 
            const cont = document.getElementById('scene-outliner'); 
            const countLabel = document.getElementById('object-count');
            countLabel.textContent = shapes.length + ' object' + (shapes.length !== 1 ? 's' : '');
            cont.innerHTML = ''; 
            
            if(shapes.length === 0) {
                cont.innerHTML = '<div class="outliner-empty">No objects in scene</div>';
                return;
            }
            
            shapes.forEach(shape => { 
                const div = document.createElement('div'); 
                div.className = `outliner-item ${selectedObject === shape ? 'selected' : ''}`; 
                const intensity = shape.material.emissiveIntensity;
                let glowIcon = '';
                if(intensity > GLOW_THRESHOLD) glowIcon = '✨';
                else if(intensity > 0) glowIcon = '·';
                const typeIcons = { box: '📦', sphere: '⚪', cylinder: '🧴', torus: '🍩' };
                const typeIcon = typeIcons[shape.userData.type] || '◆';
                
                div.innerHTML = `
                    <div class="outliner-info" onclick="selectObjectById('${shape.userData.id}')">
                        <span class="outliner-icon">${typeIcon}</span>
                        <span class="outliner-name">${shape.userData.type}</span>
                        <span class="outliner-id">#${shape.userData.id}</span>
                        ${glowIcon ? `<span style="margin-left:2px;font-size:8px">${glowIcon}</span>` : ''}
                    </div>
                    <div class="outliner-actions">
                        <button class="outliner-action-btn duplicate" onclick="event.stopPropagation(); duplicateObjectById('${shape.userData.id}')" title="Duplicate">⧉</button>
                        <button class="outliner-action-btn delete" onclick="event.stopPropagation(); deleteObjectById('${shape.userData.id}')" title="Delete">×</button>
                    </div>
                `; 
                cont.appendChild(div); 
            }); 
        }
        
        function selectObjectById(id) {
            const obj = shapes.find(s => s.userData.id === id);
            if(obj) selectObject(obj);
        }
        function duplicateObjectById(id) {
            const obj = shapes.find(s => s.userData.id === id);
            if(obj) duplicateObject(obj);
        }
        function deleteObjectById(id) {
            const obj = shapes.find(s => s.userData.id === id);
            if(obj) deleteObject(obj);
        }
        
        function openExport() { 
            const snapshot = shapes.map(s => ({ 
                type: s.userData.type, 
                position: {x:s.position.x,y:s.position.y,z:s.position.z}, 
                rotation: {x:s.rotation.x,y:s.rotation.y,z:s.rotation.z}, 
                scale: {x:s.scale.x,y:s.scale.y,z:s.scale.z}, 
                color: '#'+s.material.color.getHexString(), 
                emissiveIntensity: s.material.emissiveIntensity, 
                emissiveColor: '#'+s.material.emissive.getHexString() 
            })); 
            document.getElementById('export-area').value = JSON.stringify(snapshot, null, 2); 
            document.getElementById('export-modal').style.display = 'flex'; 
        }
        function copyExport() { 
            const t = document.getElementById('export-area'); 
            t.select(); 
            document.execCommand('copy'); 
        }
        function openImport() { 
            document.getElementById('import-area').value = ''; 
            document.getElementById('import-modal').style.display = 'flex'; 
        }
        function importScene() { 
            try { 
                const data = JSON.parse(document.getElementById('import-area').value); 
                applyHistoryState(JSON.stringify(data)); 
                saveHistory(); 
                closeModals(); 
            } catch(e) { 
                alert("Invalid JSON"); 
            } 
        }
        function closeModals() { 
            document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); 
        }
        function onPointerDown(e) { 
            if(transformControl.dragging) return; 
            mouse.x = (e.clientX/window.innerWidth)*2-1; 
            mouse.y = -(e.clientY/window.innerHeight)*2+1; 
            raycaster.setFromCamera(mouse, camera); 
            const hits = raycaster.intersectObjects(shapes); 
            if(hits.length) selectObject(hits[0].object); 
            else if(!transformControl.axis) deselectObject(); 
        }
        function onKeyDown(e) { 
            if(document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return; 
            if(e.ctrlKey||e.metaKey) { 
                if(e.key==='z'){e.preventDefault();undo();} 
                if(e.key==='y'){e.preventDefault();redo();} 
            } 
            switch(e.key.toLowerCase()) { 
                case 'w': setGizmoMode('translate'); break; 
                case 'e': setGizmoMode('rotate'); break; 
                case 'r': setGizmoMode('scale'); break; 
                case 'x': toggleSpace(); break; 
                case 'delete': deleteSelected(); break; 
            } 
        }
        function onWindowResize() { 
            camera.aspect = window.innerWidth/window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        }
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        init(); animate();
    </script>
</body>
</html>
